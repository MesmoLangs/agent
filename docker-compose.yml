name: ${AGENT_NAME:-claude-agent}

services:
  agent:
    build: .
    container_name: ${AGENT_NAME:-claude-agent}
    restart: unless-stopped
    stdin_open: true
    tty: true

    environment:
      # ── Telegram ──────────────────────────────────────────────────────────
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
      - ALLOWED_CHAT_ID=${ALLOWED_CHAT_ID}

      # ── Git repos to clone/pull at startup (comma-separated SSH URLs) ─────
      - GIT_REPOS=${GIT_REPOS}

      # ── AWS Bedrock (for Claude Code) ─────────────────────────────────────
      - CLAUDE_CODE_USE_BEDROCK=1
      - CLAUDE_CODE_SANDBOXED=1
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL}

    volumes:
      - workspace:/workspace
      - claude-memory:/home/agent/.claude
      - ~/.ssh/github:/root/.ssh/id_rsa:ro
      - ~/.gitconfig:/host-settings/.gitconfig:ro
      - ~/.claude.json:/host-settings/.claude.json:ro
      - ~/.claude/settings.json:/host-settings/claude-settings.json:ro

    # No ports needed — bot uses outbound polling only

volumes:
  workspace:
    name: ${AGENT_NAME:-claude-agent}-workspace
  claude-memory:
    name: ${AGENT_NAME:-claude-agent}-claude-memory
