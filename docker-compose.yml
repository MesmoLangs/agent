services:
  tutor-claude-agent:
    build: .
    container_name: claude-agent
    restart: unless-stopped
    stdin_open: true
    tty: true

    environment:
      # ── Telegram ──────────────────────────────────────────────────────────
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
      - ALLOWED_CHAT_ID=${ALLOWED_CHAT_ID}

      # ── GitHub ────────────────────────────────────────────────────────────
      - GITHUB_REPO=${GITHUB_REPO}           # e.g. git@github.com:you/repo.git
      - GIT_EMAIL=${GIT_EMAIL}
      - GIT_NAME=${GIT_NAME:-Claude Agent}
      - BASE_BRANCH=${BASE_BRANCH:-main}

      # ── AWS Bedrock (for Claude Code) ─────────────────────────────────────
      - CLAUDE_CODE_USE_BEDROCK=1
      - CLAUDE_CODE_SANDBOXED=1
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL}   # your Bedrock inference profile ID

    # Persist the cloned repo between container restarts
    volumes:
      - t-workspace:/workspace
      - t-claude-memory:/home/agent/.claude
      - ~/.ssh/github:/root/.ssh/id_rsa:ro

    # No ports needed — bot uses outbound polling only

volumes:
  t-workspace:
  t-claude-memory:
